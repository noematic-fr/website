name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install, build, and upload site
        uses: withastro/action@v6
        env:
          PUBLIC_WATCHNO_INGEST_URL: https://api.watchnocode.noematic.eu/ingest
          PUBLIC_WATCHNO_API_KEY: ${{ secrets.WATCHNO_API_KEY }}
          PUBLIC_WATCHNO_PROJECT_ID: ${{ secrets.WATCHNO_PROJECT_ID }}
          PUBLIC_WATCHNO_SCRIPT_URL: https://qi.noematic.eu/watchno.min.js

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5